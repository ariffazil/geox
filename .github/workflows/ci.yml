name: GEOX CI
on: [push, pull_request]
jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Secret scan (trufflehog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          extra_args: --only-verified

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -e ".[dev]"
      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc --fix-applied || true
      - run: ruff check server.py arifos/geox/geox_validator.py arifos/geox/geox_hardened.py
      - run: mypy server.py arifos/geox/geox_validator.py arifos/geox/geox_hardened.py
      - run: pytest tests/ -v --tb=short
      - name: FastMCP HTTP smoke test
        run: |
          python server.py --transport http --host 127.0.0.1 --port 8765 > /tmp/geox-fastmcp.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          python - <<'PY'
          import time
          import httpx

          base = "http://127.0.0.1:8765"
          health_ok = False
          mcp_ok = False

          with httpx.Client(timeout=2.0, follow_redirects=False) as client:
              for _ in range(30):
                  try:
                      health = client.get(f"{base}/health")
                      health_ok = health.status_code == 200 and health.text.strip() == "OK"
                      mcp = client.get(f"{base}/mcp")
                      mcp_ok = mcp.status_code != 404
                      if health_ok and mcp_ok:
                          break
                  except httpx.HTTPError:
                      pass
                  time.sleep(1)

          if not health_ok or not mcp_ok:
              raise SystemExit(
                  f"FastMCP HTTP smoke test failed: health_ok={health_ok}, mcp_ok={mcp_ok}"
              )
          PY
