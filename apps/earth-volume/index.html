<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEOX Seismic Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap');
        
        :root {
            --geox-black: #0a0a0c;
            --geox-accent: #3b82f6;
            --geox-warn: #f59e0b;
            --geox-stop: #ef4444;
            --geox-glass: rgba(20, 20, 25, 0.85);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--geox-black);
            color: #e2e8f0;
            overflow: hidden;
            height: 100vh;
        }

        .glass {
            background: var(--geox-glass);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .seismic-canvas {
            background-image: linear-gradient(rgba(20,20,30,0.8), rgba(20,20,30,0.8)), 
                              repeating-linear-gradient(45deg, #1e293b 0px, #1e293b 10px, #0f172a 10px, #0f172a 20px);
            cursor: crosshair;
        }

        .mono { font-family: 'JetBrains Mono', monospace; }

        .scanline {
            position: absolute;
            height: 1px;
            width: 100%;
            background: rgba(59, 130, 246, 0.4);
            pointer-events: none;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header / Navigation -->
    <header class="glass h-14 flex items-center justify-between px-6 z-50">
        <div class="flex items-center gap-3">
            <div class="w-2 h-6 bg-blue-500 rounded-full animate-pulse"></div>
            <h1 class="font-semibold text-lg tracking-tight">GEOX <span class="text-blue-400">SEISMIC</span></h1>
        </div>
        <div class="flex items-center gap-4 text-xs font-medium">
            <div class="flex items-center gap-2 px-3 py-1 bg-slate-800 rounded-full">
                <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                <span class="opacity-70">WIKI-G: ACTIVE</span>
            </div>
            <button id="holdBtn" class="flex items-center gap-2 px-4 py-1 bg-amber-600/20 text-amber-500 border border-amber-600/30 rounded-full hover:bg-amber-600/30 transition-all">
                <span class="font-bold tracking-widest">888_HOLD</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 relative flex overflow-hidden">
        
        <!-- Left Pane: Controls -->
        <aside class="w-72 glass border-r divide-y divide-white/5 flex flex-col p-4 gap-6 z-40">
            <div>
                <label class="text-[10px] uppercase tracking-widest text-slate-500 mb-3 block">Display Canon</label>
                <div class="space-y-4">
                    <div class="space-y-2">
                        <div class="flex justify-between text-[11px] mono">
                            <span>ToAC CONTRAST</span>
                            <span id="contrastVal">1.2x</span>
                        </div>
                        <input type="range" id="contrast" min="0.5" max="3" step="0.1" value="1.2" 
                               class="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <label class="text-[10px] uppercase tracking-widest text-slate-500 mb-3 block">Claim Evidence</label>
                <div class="space-y-2">
                    <div class="p-3 bg-blue-500/5 border border-blue-500/10 rounded-lg">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[10px] font-bold text-blue-400">CLAIM</span>
                            <span class="text-[9px] opacity-50 mono">v1.2</span>
                        </div>
                        <p class="text-[11px] leading-relaxed opacity-80 italic">Seismic section vertically exaggerated 5.0x for structural clarity.</p>
                    </div>
                </div>
            </div>

            <div class="mt-auto pt-4 flex flex-col gap-2">
                <button id="syncState" class="w-full py-2 bg-slate-800 hover:bg-slate-700 text-xs border border-white/10 rounded transition-all">
                    SYNC TO LLM
                </button>
            </div>
        </aside>

        <!-- Center: Seismic Canvas -->
        <div class="flex-1 relative seismic-canvas overflow-hidden">
            <div id="scanline" class="scanline" style="top: 50%;"></div>
            
            <!-- Context HUD overlay -->
            <div class="absolute bottom-6 left-6 flex gap-4">
                <div class="glass px-4 py-2 rounded-lg border border-white/10 flex flex-col pointer-events-none">
                    <span class="text-[10px] text-slate-500 tracking-widest lowercase">z-depth</span>
                    <span id="coordZ" class="mono text-lg text-blue-400">4250.0 ms</span>
                </div>
            </div>

            <!-- 888_HOLD Overlays -->
            <div id="holdOverlay" class="hidden absolute inset-0 glass bg-amber-950/20 z-50 flex items-center justify-center p-12">
                <div class="max-w-md w-full bg-black border-2 border-amber-600/50 p-8 rounded-2xl shadow-2xl text-center">
                    <div class="w-16 h-16 bg-amber-600/20 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-6">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-bold mb-4 tracking-tight">888_HOLD ACTIVE</h2>
                    <p class="text-sm opacity-70 mb-8 font-light">Unphysically low contrast detected. Geological validity check required before interpretation can proceed.</p>
                    <button id="resolveHold" class="w-full py-3 bg-amber-600 text-black font-bold rounded-xl hover:bg-amber-500 transition-all">
                        SIGN AS HUMAN WITNESS
                    </button>
                </div>
            </div>
        </div>

    </main>

    <!-- UI Bridge Script -->
    <script>
        // GEOX UI Bridge Logic
        const bridge = {
            async emit(method, params = {}) {
                const event = {
                    jsonrpc: "2.0",
                    method,
                    params,
                    timestamp: new Date().toISOString()
                };
                console.log(`[GEOX Bridge] Emitting: ${method}`, event);
                
                // standard postMessage pattern for iframes
                if (window.parent !== window) {
                    window.parent.postMessage(event, "*");
                }
            },
            
            init() {
                this.emit("app.initialize", {
                    app_id: "geox.seismic.viewer",
                    version: "1.0.0",
                    host_capabilities: ["mcp_tools", "artifacts"]
                });
            }
        };

        // Interactive UI logic
        const contrast = document.getElementById('contrast');
        const contrastVal = document.getElementById('contrastVal');
        const holdBtn = document.getElementById('holdBtn');
        const holdOverlay = document.getElementById('holdOverlay');
        const resolveHold = document.getElementById('resolveHold');
        const syncBtn = document.getElementById('syncState');
        const scanline = document.getElementById('scanline');
        const coordZ = document.getElementById('coordZ');

        contrast.addEventListener('input', (e) => {
            const val = e.target.value;
            contrastVal.innerText = `${val}x`;
            bridge.emit("ui.action", { action: "contrast_change", value: parseFloat(val) });
        });

        holdBtn.addEventListener('click', () => {
            holdOverlay.classList.toggle('hidden');
        });

        resolveHold.addEventListener('click', () => {
            holdOverlay.classList.add('hidden');
            bridge.emit("ui.action", { action: "hold_resolve", type: "sign_off" });
        });

        syncBtn.addEventListener('click', () => {
            bridge.emit("ui.state.sync", { 
                z_depth: coordZ.innerText,
                contrast_scale: contrast.value 
            });
        });

        window.addEventListener('mousemove', (e) => {
            if (e.target.closest('.seismic-canvas')) {
                const rect = e.target.getBoundingClientRect();
                const y = e.clientY - rect.top;
                scanline.style.top = `${y}px`;
                const depth = (y / rect.height * 8000).toFixed(1);
                coordZ.innerText = `${depth} ms`;
            }
        });

        // Initialize App
        bridge.init();
    </script>
</body>
</html>
