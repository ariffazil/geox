<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="44 Earth intelligence skills across 11 domains. Searchable skill registry for geospatial operations.">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="logo">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        GEOX
      </a>
      <nav class="nav-links">
        <a href="catalog.html" class="active">Skills</a>
        <a href="wiki.html">Wiki</a>
        <a href="network.html">Network</a>
        <a href="https://geox.arif-fazil.com" target="_blank">Cockpit →</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- Hero -->
    <section class="hero">
      <div class="container">
        <h1>Earth Intelligence Skills</h1>
        <p>44 operational skills across 11 domains. For humans, machines, and the spaces between.</p>
        <div class="seal">DITEMPA BUKAN DIBERI — Forged, Not Given</div>
      </div>
    </section>

    <!-- Stats -->
    <div class="stats-bar">
      <div><strong id="stats-count">44 skills</strong> total</div>
      <div><strong>11</strong> domains</div>
      <div><strong>6</strong> substrates</div>
    </div>

    <!-- Search & Filters -->
    <section class="search-section">
      <div class="container">
        <div class="search-box">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
          </svg>
          <input type="text" id="skill-search" placeholder="Search skills, inputs, outputs..." autocomplete="off">
        </div>
        
        <div class="filter-chips" id="domain-filters">
          <!-- Populated by JS -->
        </div>
        
        <div class="filter-chips" id="substrate-filters" style="margin-top: 0.75rem;">
          <!-- Populated by JS -->
        </div>
      </div>
    </section>

    <!-- Skills Grid -->
    <section class="skills-section">
      <div class="container" id="skills-container">
        <!-- Populated by JS -->
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-seal">ΔΩΨ — SOUL · MIND · VOID</div>
    <div class="footer-copy">GEOX Earth Intelligence Core · 2026</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
