# GEOX Configuration — arifOS Geological Coprocessor
# DITEMPA BUKAN DIBERI
#
# This configuration file governs the GEOX geological intelligence
# coprocessor pipeline. GEOX is a domain coprocessor for arifOS
# and does NOT replace the arifOS Constitutional MCP Kernel.
#
# Pipeline: 000 INIT → 111 THINK → 333 EXPLORE → 555 HEART →
#           777 REASON → 888 AUDIT → 999 SEAL
#
# Verdict vocabulary: SEAL | PARTIAL | SABAR | VOID

version: "0.1.0"
kernel: "arifOS-v2026"
seal: "DITEMPA BUKAN DIBERI"

# ---------------------------------------------------------------------------
# Governance — Constitutional Floor Enforcement
# ---------------------------------------------------------------------------

governance:
  # Minimum confidence for a LEM output to be accepted (F2 Truth)
  lem_confidence_threshold: 0.75

  # Minimum confidence for a VLM output to be accepted (F7 Humility)
  vlm_confidence_threshold: 0.65

  # All quantities must carry ProvenanceRecord (F11 Authority)
  provenance_required: true

  # F7 Humility: uncertainty must be in [floor, ceiling]
  uncertainty_floor: 0.03
  uncertainty_ceiling: 0.15

  # VLM Perception Bridge Rule:
  # Visual outputs from SeismicVLMTool alone are never decisive.
  # They must be corroborated by LEM, well logs, or simulator data.
  vlm_perception_bridge: true
  vlm_minimum_uncertainty: 0.15

  # Risk level thresholds and actions
  risk_levels:
    low:
      threshold: 0.0         # confidence below this = elevated risk
      action: auto           # can proceed without human approval
      human_signoff: false
      regulator_notify: false
      legal_review: false

    medium:
      threshold: 0.5         # confidence below this = high risk
      action: human_signoff  # geoscientist sign-off required
      human_signoff: true
      regulator_notify: false
      legal_review: false

    high:
      threshold: 0.8         # confidence below this = critical
      action: regulator_required
      human_signoff: true
      regulator_notify: true
      legal_review: false

    critical:
      threshold: 0.95
      action: 888_HOLD       # full 888 HOLD — no automated action
      human_signoff: true
      regulator_notify: true
      legal_review: true

  # Constitutional Floor enforcement flags
  # Set false to disable a specific floor check (NOT RECOMMENDED)
  floor_enforcement:
    F1_amanah: true       # Reversibility / Traceability
    F2_truth: true        # Truth ≥ 0.99 — no false certainty claims
    F4_clarity: true      # All quantities carry explicit units
    F7_humility: true     # Uncertainty in [0.03, 0.15]
    F9_anti_hantu: true   # No phantom/hallucinated data
    F11_authority: true   # Provenance mandatory for all quantities
    F13_sovereign: true   # Human veto gate on high-risk insights

  # Verdict thresholds for SEAL/PARTIAL/SABAR/VOID
  verdict_thresholds:
    seal_min_supported_ratio: 0.80    # ≥80% insights supported → SEAL
    partial_min_supported_ratio: 0.50 # 50–79% → PARTIAL
    # <50% → SABAR; any contradicted → VOID

# ---------------------------------------------------------------------------
# Allowed Tools
# ---------------------------------------------------------------------------

allowed_tools:
  - EarthModelTool         # Large Earth Model (LEM) adapter
  - EOFoundationModelTool  # Earth Observation foundation model
  - SeismicVLMTool         # Seismic Vision Language Model
  - SimulatorTool          # Basin / PVT simulator
  - GeoRAGTool             # Geological RAG over literature

# ---------------------------------------------------------------------------
# Pipeline Configuration
# ---------------------------------------------------------------------------

pipeline:
  pipeline_id: "geox-v0.1"
  stages:
    - "000_INIT"
    - "111_THINK"
    - "333_EXPLORE"
    - "555_HEART"
    - "777_REASON"
    - "888_AUDIT"
    - "999_SEAL"
  max_tool_retries: 3
  tool_retry_delay_seconds: 0.5  # Exponential backoff: delay * attempt
  timeout_seconds: 120           # Total pipeline timeout
  parallel_tool_execution: false # Reserved for future parallelism

# ---------------------------------------------------------------------------
# arifOS Kernel Integration
# ---------------------------------------------------------------------------

arifos:
  # URL of the arifOS MCP kernel (used when running in production mode)
  kernel_url: "http://arifosmcp:8000/mcp"

  # arifOS MCP tool mappings
  tools:
    planner: "agi_mind"        # 333 EXPLORE — LLM plan generation
    memory: "M4_qdrant"        # M4 Qdrant vector memory store
    audit: "vault_ledger"      # 888 AUDIT — immutable event ledger
    heart: "asi_heart"         # 555 HEART — wisdom alignment check
    apex: "apex_soul"          # 999 SEAL — final constitutional seal

  # arifOS pipeline telemetry block template
  telemetry:
    version: "2.1"
    P2: 1.0                    # Peace ≥ 1.0 (F5)
    uncertainty_range: [0.03, 0.15]
    seal: "DITEMPA BUKAN DIBERI"

# ---------------------------------------------------------------------------
# MCP Server Configuration
# ---------------------------------------------------------------------------

server:
  host: "0.0.0.0"
  port: 8100
  log_level: "INFO"
  workers: 1                   # Increase for production load
  reload: false                # Set true for development
  access_log: true

  # MCP protocol settings
  mcp:
    protocol_version: "2024-11-05"
    max_request_size_bytes: 10485760  # 10 MB

  # CORS (for browser-based arifOS UIs)
  cors:
    allow_origins: ["*"]
    allow_methods: ["GET", "POST", "OPTIONS"]

# ---------------------------------------------------------------------------
# Memory Backend Configuration
# ---------------------------------------------------------------------------

memory:
  # Options: in_memory | qdrant
  backend: "in_memory"

  # Qdrant settings (used when backend: qdrant)
  qdrant_url: "http://qdrant:6333"
  collection: "geox_geological_memory"
  vector_size: 1536            # OpenAI text-embedding-3-small output dim
  distance: "Cosine"

  # JSONL export path for HuggingFace Dataset upload
  export_path: "/data/geox_memory_export.jsonl"

# ---------------------------------------------------------------------------
# Earth Model Conventions
# ---------------------------------------------------------------------------

earth_models:
  # Default coordinate reference system
  default_crs: "EPSG:4326"

  # Depth convention: positive values = below surface (depth increases downward)
  depth_convention: "positive_down_meters"

  # Time convention for all timestamps
  time_convention: "UTC"

  # Seismic velocity bounds (sanity checks for F2 Truth)
  velocity_bounds:
    min_ms: 300.0    # m/s — air velocity (physical lower bound)
    max_ms: 8500.0   # m/s — upper mantle

  # Porosity bounds
  porosity_bounds:
    min_fraction: 0.0
    max_fraction: 0.5  # >50% porosity is physically unrealistic for rock

  # Density bounds
  density_bounds:
    min_gcm3: 1.0    # saturated sediment
    max_gcm3: 3.5    # mafic/ultramafic rock

  # Temperature bounds
  temperature_bounds:
    min_degC: -10.0  # permafrost
    max_degC: 400.0  # hydrothermal / deep geothermal

# ---------------------------------------------------------------------------
# Output Configuration
# ---------------------------------------------------------------------------

output:
  telemetry_version: "2.1"
  seal: "DITEMPA BUKAN DIBERI"
  default_language: "en"

  # Report generation settings
  reports:
    include_audit_log: true
    include_provenance_chain: true
    include_floor_compliance: true
    markdown_max_insight_length: 500    # chars before truncation in tables
    json_indent: 2

  # Logging
  logging:
    level: "INFO"
    format: "%(asctime)s [%(name)s] %(levelname)s: %(message)s"
    log_to_file: false
    log_file_path: "/var/log/geox/geox.log"

# ---------------------------------------------------------------------------
# Geological Domain Settings
# ---------------------------------------------------------------------------

geology:
  # Default basin for demos and testing
  default_basin: "Malay Basin"

  # Recognised play types
  play_types:
    - "stratigraphic"
    - "structural"
    - "combination"
    - "carbonate_buildup"
    - "deltaic"
    - "inverted_basin"
    - "wrench"

  # Recognised data types for available_data field
  data_types:
    - "seismic_2d"
    - "seismic_3d"
    - "well_logs"
    - "core"
    - "eo"           # Earth Observation / satellite
    - "gravity"
    - "magnetic"
    - "production"   # Production history
    - "fluid_samples"
    - "biostratigraphy"

  # Geological timescale reference
  timescale: "ICS-2023/09"

  # Vitrinite reflectance maturity thresholds
  maturity_thresholds:
    immature_max_ro: 0.60    # %Ro
    oil_window_min_ro: 0.60  # %Ro
    oil_window_max_ro: 1.35  # %Ro
    gas_window_min_ro: 1.35  # %Ro
    overmature_min_ro: 3.00  # %Ro
