# GEOX Seismic Attribute Taxonomy
# DITEMPA BUKAN DIBERI
#
# Single source of truth for all seismic attribute registrations.
# Feeds:
#   - ContrastMetadata (contrast_wrapper.py)
#   - SeismicAttributeTool dispatch table
#   - _infer_physical_axes() / _generate_anomalous_risk() helpers
#   - GEOX_BLOCK risk gates (anomalous_risk: high → mandate well_tie)
#
# Floor references:
#   F4  Clarity    — physical_axes required on every attribute
#   F7  Humility   — uncertainty_floor defines minimum output uncertainty
#   F9  Anti-Hantu — anomalous_risk tags prevent silent contrast illusions
#
# Epistemic tags (geox_status):
#   CLAIM       — supported by physical law or peer-reviewed equation
#   PLAUSIBLE   — consistent with practice, not formally derived here
#   HYPOTHESIS  — testable speculation, requires validation
#   ESTIMATE    — approximation with stated bounds
#
# Implementation priority:
#   sprint_1    — foundation (SeismicAttributeTool, classical single-trace)
#   sprint_2    — multi-trace structural (SeismicStructuralTool)
#   sprint_3    — spectral / AVO (SpectralMetaAttributeTool)
#   sprint_4    — ML / facies (SeisCoDE bridge, meta-attributes)
#   later       — inversion, kinematic (requires prestack or external solver)

version: "1.0"
geox_version: "0.3.0"
sealed: "2026-03-31"
seal: "DITEMPA BUKAN DIBERI"
floor_references: [F4, F7, F9]

# ---------------------------------------------------------------------------
# CLASS 1 — STRUCTURAL / GEOMETRICAL
# What it measures: geometry and continuity of reflectors
# Primary use: fault detection, fold mapping, stratigraphic traps
# ---------------------------------------------------------------------------
classes:

  structural:
    class_id: 1
    display_name: "Structural / Geometrical"
    description: "Geometry and continuity of reflectors — faults, folds, strat traps"
    primary_use: [fault_detection, fold_mapping, stratigraphic_traps, fracture_density]
    hc_sensitive: false
    structure_sensitive: true
    attributes:

      - name: coherence
        aliases: [similarity, semblance, variance_inverse]
        physical_axes: [waveform_similarity, lateral_continuity, discontinuity]
        computation: multi_trace
        kernel: "3D window — typically 3×3 or 5×5 traces, 9–15 ms"
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        equation_ref: "Marfurt et al. (1998) — semblance-based coherence, Geophysics 63(4)"
        contrast_canon_notes: >
          High physical traceability. Low display-bias risk.
          Visual artifacts at data boundaries and near surface.
          Acquisition footprint can mimic geological discontinuity — validate timing.
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: intermediate
        geox_priority: sprint_2

      - name: dip
        aliases: [local_dip, reflector_dip]
        physical_axes: [reflector_geometry, structural_tilt]
        computation: multi_trace
        kernel: "3D dip estimation window"
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        equation_ref: "Chopra & Marfurt (2007) — Seismic Attributes for Prospect Identification"
        contrast_canon_notes: "Reliable geometry descriptor. Artifacts at unconformities and noise zones."
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: intermediate
        geox_priority: sprint_2

      - name: azimuth
        aliases: [dip_azimuth, reflector_azimuth]
        physical_axes: [reflector_orientation, structural_fabric]
        computation: multi_trace
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        contrast_canon_notes: "Directional attribute — color wheel encoding can mislead. Always show alongside dip magnitude."
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: intermediate
        geox_priority: sprint_2

      - name: curvature_most_positive
        aliases: [k_pos, k1]
        physical_axes: [flexure, strain, fracture_density_proxy]
        computation: multi_trace
        anomalous_risk: medium
        uncertainty_floor: 0.08
        geox_status: PLAUSIBLE
        equation_ref: "Chopra & Marfurt (2007) — volumetric curvature"
        contrast_canon_notes: >
          Curvature amplifies noise; strong visual contrast does not equal strong geological signal.
          High-frequency acquisition noise can produce spurious curvature highs.
          Cross-validate with coherence and structure maps.
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: advanced
        geox_priority: sprint_2

      - name: curvature_most_negative
        aliases: [k_neg, k2]
        physical_axes: [syncline_geometry, downward_flexure, fracture_density_proxy]
        computation: multi_trace
        anomalous_risk: medium
        uncertainty_floor: 0.08
        geox_status: PLAUSIBLE
        contrast_canon_notes: "Same risk profile as curvature_most_positive. Pair always."
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: advanced
        geox_priority: sprint_2

      - name: curvature_mean
        physical_axes: [surface_shape, structural_form]
        computation: multi_trace
        anomalous_risk: low
        uncertainty_floor: 0.07
        geox_status: CLAIM
        implementation_complexity: advanced
        geox_priority: sprint_2

      - name: fault_likelihood
        aliases: [fault_probability, edge_detection]
        physical_axes: [discontinuity, waveform_break, lateral_impedance_change]
        computation: multi_trace
        anomalous_risk: medium
        uncertainty_floor: 0.09
        geox_status: PLAUSIBLE
        contrast_canon_notes: >
          Classical versions (gradient of coherence) have medium risk.
          ML/CNN versions (AI fault attribute) carry HIGH risk — see meta-attributes.
          Always require timing + structural context validation.
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: intermediate
        geox_priority: sprint_2

  # ---------------------------------------------------------------------------
  # CLASS 2 — AMPLITUDE / STRENGTH
  # What it measures: reflection energy — DHIs, reservoir sweetness
  # ---------------------------------------------------------------------------

  amplitude:
    class_id: 2
    display_name: "Amplitude / Strength"
    description: "Reflection strength and energy — DHIs, bright/dim spots, reservoir sweetness"
    primary_use: [dhi_detection, reservoir_delineation, fluid_contacts, sweetness_mapping]
    hc_sensitive: true
    structure_sensitive: false
    attributes:

      - name: envelope
        aliases: [instantaneous_amplitude, reflection_strength, amplitude_envelope]
        physical_axes: [reflection_strength, acoustic_impedance_contrast, fluid_content_proxy]
        computation: single_trace
        kernel: "Hilbert transform → analytic signal magnitude"
        anomalous_risk: medium
        uncertainty_floor: 0.08
        geox_status: CLAIM
        equation_ref: "Taner et al. (1979) — complex seismic trace analysis, Geophysics 44(6)"
        contrast_canon_notes: >
          Strong visual contrast between gas sands and background is physically real —
          but amplitude can also reflect tuning, multiple reflections, or processing artifacts.
          Always check thickness vs tuning wavelength before claiming DHI.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: rms_amplitude
        aliases: [rms_amp, amplitude_rms]
        physical_axes: [average_reflection_energy, integrated_impedance_contrast]
        computation: single_trace
        kernel: "Windowed RMS over user-defined time gate"
        anomalous_risk: medium
        uncertainty_floor: 0.07
        geox_status: CLAIM
        contrast_canon_notes: >
          Window length choice strongly affects visual pattern.
          Short windows → noise-sensitive. Long windows → smear thin beds.
          Window must be geologically meaningful (layer-bounded when possible).
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: peak_amplitude
        physical_axes: [maximum_positive_reflection, top_interface_contrast]
        computation: single_trace
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: trough_amplitude
        physical_axes: [maximum_negative_reflection, base_interface_contrast]
        computation: single_trace
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: reflection_intensity
        aliases: [power, trace_energy]
        physical_axes: [squared_amplitude, total_reflection_energy]
        computation: single_trace
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: anomalous_contrast_index
        aliases: [aci, local_amplitude_anomaly]
        physical_axes: [amplitude_deviation_from_background, anomalous_impedance_contrast]
        computation: single_trace
        kernel: "Local window statistics: (amplitude - background_mean) / background_std"
        anomalous_risk: medium
        uncertainty_floor: 0.09
        geox_status: ESTIMATE
        equation_ref: "GEOX Contrast Canon — arifOS constitutional attribute (2026)"
        contrast_canon_notes: >
          The GEOX native attribute. Measures N-sigma deviation from local background.
          Medium risk: background window size is an interpretive choice.
          Uncertainty explicitly propagated from window statistics.
          CLAIM only after corroboration with EarthModelTool or well log amplitude calibration.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: basic
        geox_priority: sprint_1

  # ---------------------------------------------------------------------------
  # CLASS 3 — INSTANTANEOUS (COMPLEX TRACE)
  # What it measures: time-varying signal properties via Hilbert transform
  # ---------------------------------------------------------------------------

  instantaneous:
    class_id: 3
    display_name: "Instantaneous (Complex Trace)"
    description: "Time-varying signal properties from analytic trace — phase, frequency, bandwidth"
    primary_use: [thin_bed_tuning, gas_detection, waveform_character, stratigraphic_correlation]
    hc_sensitive: true
    structure_sensitive: false
    attributes:

      - name: instantaneous_phase
        aliases: [inst_phase]
        physical_axes: [waveform_continuity, reflector_correlation, phase_tracking]
        computation: single_trace
        kernel: "arctan(imaginary / real) of analytic signal"
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        equation_ref: "Taner et al. (1979)"
        contrast_canon_notes: >
          Amplitude-independent — very useful for continuity without DHI bias.
          Noise-sensitive at low-amplitude zones. Phase wrapping at ±π boundaries
          is a display artifact, not a geological feature.
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: instantaneous_frequency
        aliases: [inst_freq]
        physical_axes: [dominant_frequency, attenuation_proxy, gas_shadow_indicator]
        computation: single_trace
        kernel: "Time derivative of unwrapped instantaneous phase"
        anomalous_risk: high
        uncertainty_floor: 0.13
        geox_status: PLAUSIBLE
        equation_ref: "Taner et al. (1979)"
        contrast_canon_notes: >
          HIGH anomalous contrast risk. Instantaneous frequency is extremely
          noise-sensitive and produces geologically meaningless spikes at
          zero crossings and noise-dominated zones.
          Low-frequency shadows below gas reservoirs are geologically meaningful
          but must be verified against VSP or well-log frequency analysis.
          NEVER treat isolated low-frequency patches as confirmed gas without
          independent validation. GEOX_BLOCK if presented as CLAIM without well tie.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: basic
        geox_priority: sprint_1

      - name: instantaneous_bandwidth
        aliases: [inst_bandwidth]
        physical_axes: [frequency_spread, signal_complexity]
        computation: single_trace
        anomalous_risk: high
        uncertainty_floor: 0.13
        geox_status: ESTIMATE
        contrast_canon_notes: "Very noise-sensitive. Use only after structure-oriented smoothing."
        hc_sensitive: false
        structure_sensitive: false
        implementation_complexity: intermediate
        geox_priority: later

      - name: cosine_of_instantaneous_phase
        aliases: [cos_phase]
        physical_axes: [reflector_continuity, structural_tracking]
        computation: single_trace
        anomalous_risk: low
        uncertainty_floor: 0.06
        geox_status: CLAIM
        contrast_canon_notes: "Smoother version of instantaneous phase for display. Low risk."
        implementation_complexity: basic
        geox_priority: sprint_1

  # ---------------------------------------------------------------------------
  # CLASS 4 — SPECTRAL / TIME-FREQUENCY
  # What it measures: frequency content vs time and space
  # ---------------------------------------------------------------------------

  spectral:
    class_id: 4
    display_name: "Spectral / Time-Frequency"
    description: "Frequency content vs time — thin beds, tuning, attenuation, DHI"
    primary_use: [thin_bed_detection, tuning_analysis, stratigraphic_traps, gas_attenuation]
    hc_sensitive: true
    structure_sensitive: false
    attributes:

      - name: dominant_frequency
        physical_axes: [peak_spectral_energy_frequency, tuning_thickness_proxy]
        computation: single_trace
        anomalous_risk: medium
        uncertainty_floor: 0.09
        geox_status: CLAIM
        contrast_canon_notes: "Sensitive to bandwidth and noise floor. Smoothing required for geological interpretation."
        implementation_complexity: basic
        geox_priority: sprint_3

      - name: spectral_decomposition_magnitude
        aliases: [spec_decomp, sdec_mag]
        physical_axes: [frequency_band_energy, tuning_resonance, bed_thickness_proxy]
        computation: single_trace
        kernel: "Short-time Fourier or CWT — magnitude at target frequency"
        anomalous_risk: medium
        uncertainty_floor: 0.10
        geox_status: CLAIM
        equation_ref: "Partyka et al. (1999) — spectral decomposition, The Leading Edge"
        contrast_canon_notes: >
          Color blending of multiple frequency slices can create striking visual patterns
          that are not fully interpretable without frequency-thickness chart calibration.
          Tuning frequency must be computed from local velocity before interpretation.
        hc_sensitive: true
        structure_sensitive: true
        implementation_complexity: intermediate
        geox_priority: sprint_3

      - name: sweetness
        aliases: [sweetness_attribute]
        physical_axes: [amplitude_frequency_ratio, reservoir_quality_proxy, gas_sand_indicator]
        computation: single_trace
        kernel: "envelope / sqrt(instantaneous_frequency)"
        anomalous_risk: high
        uncertainty_floor: 0.13
        geox_status: PLAUSIBLE
        contrast_canon_notes: >
          HIGH anomalous contrast risk. Inherits noise from instantaneous_frequency.
          Very visually striking in gas sands — but mathematical artifact zones
          (zero-crossing spikes in inst_freq denominator) can produce extreme sweetness values.
          Requires clipping and noise gating before display. QUALIFY verdict mandatory.
          Never present sweetness anomaly as CLAIM without lithology + well calibration.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: intermediate
        geox_priority: sprint_3

      - name: spectral_centroid_shift
        physical_axes: [frequency_attenuation, gas_absorption, Q_degradation]
        computation: single_trace
        anomalous_risk: high
        uncertainty_floor: 0.13
        geox_status: HYPOTHESIS
        contrast_canon_notes: >
          Theoretically sound (gas causes high-frequency attenuation below reservoir)
          but difficult to separate from processing-induced frequency changes.
          Treat as HYPOTHESIS until confirmed by VSP or Q-log calibration.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: advanced
        geox_priority: sprint_3

  # ---------------------------------------------------------------------------
  # CLASS 5 — AVO / ELASTIC / INVERSION
  # What it measures: rock and fluid properties from amplitude vs offset
  # ---------------------------------------------------------------------------

  avo_elastic:
    class_id: 5
    display_name: "AVO / Elastic / Inversion"
    description: "Rock and fluid properties from offset-dependent amplitude and inversion"
    primary_use: [fluid_discrimination, lithology_prediction, reservoir_characterization]
    hc_sensitive: true
    structure_sensitive: false
    attributes:

      - name: avo_intercept
        aliases: [avo_A, zero_offset_reflectivity]
        physical_axes: [normal_incidence_reflection, acoustic_impedance_contrast]
        computation: multi_trace
        kernel: "Shuey linearization fit across offset classes"
        anomalous_risk: medium
        uncertainty_floor: 0.10
        geox_status: CLAIM
        equation_ref: "Shuey (1985) — Geophysics 50(4)"
        requires: [prestack_data, offset_gathers]
        contrast_canon_notes: "Requires prestack gathers. Post-stack approximations carry higher uncertainty."
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: advanced
        geox_priority: later

      - name: avo_gradient
        aliases: [avo_B]
        physical_axes: [shear_impedance_contrast, fluid_sensitivity, vp_vs_ratio_change]
        computation: multi_trace
        kernel: "Shuey linearization — angle-dependent slope"
        anomalous_risk: medium
        uncertainty_floor: 0.10
        geox_status: CLAIM
        equation_ref: "Shuey (1985)"
        requires: [prestack_data, offset_gathers, well_control]
        contrast_canon_notes: "Cross-plot A vs B for fluid class discrimination. Requires rock physics calibration."
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: advanced
        geox_priority: later

      - name: acoustic_impedance
        aliases: [p_impedance, AI]
        physical_axes: [velocity_density_product, lithology_fluid_indicator]
        computation: single_trace
        kernel: "Post-stack inversion (model-based or sparse-spike)"
        anomalous_risk: medium
        uncertainty_floor: 0.10
        geox_status: CLAIM
        requires: [wavelet_extraction, low_frequency_model, well_ties]
        contrast_canon_notes: >
          Requires well tie and low-frequency model. Result is non-unique without constraints.
          888_HOLD triggered for resource estimation use — requires human_signoff.
        hc_sensitive: true
        structure_sensitive: false
        implementation_complexity: advanced
        geox_priority: later

      - name: vp_vs_ratio
        aliases: [vpvs]
        physical_axes: [fluid_saturation, lithology_discrimination, poisson_ratio_proxy]
        computation: multi_trace
        anomalous_risk: medium
        uncertainty_floor: 0.11
        geox_status: PLAUSIBLE
        requires: [prestack_data, elastic_inversion]
        implementation_complexity: advanced
        geox_priority: later

  # ---------------------------------------------------------------------------
  # CLASS 6 — FACIES / PATTERN / CLASSIFICATION
  # What it measures: seismic texture and multi-attribute patterns
  # ---------------------------------------------------------------------------

  facies_pattern:
    class_id: 6
    display_name: "Facies / Pattern / Classification"
    description: "Multi-attribute texture and seismic facies — classification and ML-derived volumes"
    primary_use: [facies_mapping, channel_delineation, reservoir_distribution, lithology_prediction]
    hc_sensitive: true
    structure_sensitive: true
    attributes:

      - name: som_facies
        aliases: [self_organizing_map_facies, unsupervised_facies]
        physical_axes: [multi_attribute_pattern_space, seismic_texture_cluster]
        computation: multi_trace
        anomalous_risk: high
        uncertainty_floor: 0.13
        geox_status: HYPOTHESIS
        contrast_canon_notes: >
          HIGH anomalous contrast risk. SOM clusters may reflect acquisition geometry,
          processing differences, or noise clusters rather than geology.
          Validation requires well penetration in multiple facies classes.
          Color assignment to clusters is arbitrary — different runs produce different colors
          for equivalent geology. ALWAYS document cluster-geology mapping explicitly.
        hc_sensitive: true
        structure_sensitive: true
        implementation_complexity: advanced
        geox_priority: sprint_4

      - name: meta_fault_probability
        aliases: [cnn_fault_prob, ai_fault_attribute, deep_fault_likelihood]
        physical_axes: [discontinuity, learned_nonlinear_pattern, coherence_curvature_fusion]
        computation: multi_trace
        kernel: "CNN / U-Net segmentation on stacked attribute volumes"
        anomalous_risk: high
        uncertainty_floor: 0.15
        geox_status: HYPOTHESIS
        requires: [training_data, well_calibration, classical_attribute_inputs]
        contrast_canon_notes: >
          HIGH anomalous contrast risk. CNN fault probability can amplify
          acquisition footprint, multiple reflections, or noise to fault-like
          visual patterns. Very visually compelling — HIGH risk of silent contrast illusion.
          MANDATORY: validate against coherence + curvature + structural timing.
          GEOX_BLOCK if presented as CLAIM without well ties and horizon flattening.
          Uncertainty floor = 0.15 (Perception Bridge floor — same as VLM outputs).
        hc_sensitive: false
        structure_sensitive: true
        implementation_complexity: advanced
        geox_priority: sprint_4

      - name: seiscodeembedding
        aliases: [seiscod_latent, foundation_model_attribute]
        physical_axes: [learned_seismic_pattern, contrastive_self_distillation_representation]
        computation: multi_trace
        kernel: "SeisCoDE Vision Transformer — contrastive self-distillation (arxiv 2505.20518v1)"
        anomalous_risk: high
        uncertainty_floor: 0.15
        geox_status: HYPOTHESIS
        equation_ref: "Archibong et al. (2025) — SeisCoDE, arxiv 2505.20518v1 (note: v2 withdrawn)"
        requires: [seiscod_model_weights, gpu_inference]
        contrast_canon_notes: >
          Foundation model latent representation. Treats anomalous contrast as learned deviation
          from self-distilled seismic distribution — functionally a learned ACI.
          Perception Bridge floor applies: uncertainty ≥ 0.15.
          V2 of paper withdrawn June 2025 — provenance under monitoring. QUALIFY verdict only.
          Maps to LEMBridgeTool pattern in GEOX Plane 2.
        hc_sensitive: true
        structure_sensitive: true
        implementation_complexity: advanced
        geox_priority: sprint_4

  # ---------------------------------------------------------------------------
  # CLASS 7 — KINEMATIC / TIME-RELATED
  # What it measures: time relationships and moveout
  # ---------------------------------------------------------------------------

  kinematic:
    class_id: 7
    display_name: "Kinematic / Time-Related"
    description: "Time relationships, moveout, residual velocity"
    primary_use: [velocity_quality_control, time_shift_monitoring, 4d_seismic]
    hc_sensitive: false
    structure_sensitive: false
    attributes:

      - name: residual_moveout
        physical_axes: [velocity_error, anisotropy_proxy, 4d_time_shift]
        computation: multi_trace
        anomalous_risk: low
        uncertainty_floor: 0.07
        geox_status: ESTIMATE
        requires: [prestack_data, velocity_model]
        implementation_complexity: advanced
        geox_priority: later

      - name: time_shift_4d
        aliases: [4d_time_shift, production_time_shift]
        physical_axes: [pressure_saturation_change, compaction_signal]
        computation: multi_trace
        anomalous_risk: medium
        uncertainty_floor: 0.10
        geox_status: ESTIMATE
        requires: [repeat_seismic_surveys, careful_cross_equalization]
        contrast_canon_notes: "Requires matched processing between baseline and monitor surveys. Misregistration = false 4D signal."
        implementation_complexity: advanced
        geox_priority: later

# ---------------------------------------------------------------------------
# GEOX SPRINT MAP — implementation sequence
# ---------------------------------------------------------------------------

sprint_plan:
  sprint_1_foundation:
    tool: SeismicAttributeTool
    plane: 1
    uncertainty_range: [0.06, 0.13]
    attributes:
      - envelope
      - rms_amplitude
      - peak_amplitude
      - trough_amplitude
      - reflection_intensity
      - anomalous_contrast_index
      - instantaneous_phase
      - instantaneous_frequency
      - cosine_of_instantaneous_phase

  sprint_2_structural:
    tool: SeismicStructuralTool
    plane: 1
    uncertainty_range: [0.06, 0.10]
    attributes:
      - coherence
      - dip
      - azimuth
      - curvature_most_positive
      - curvature_most_negative
      - curvature_mean
      - fault_likelihood

  sprint_3_spectral:
    tool: SpectralMetaAttributeTool
    plane: 1
    uncertainty_range: [0.09, 0.13]
    attributes:
      - dominant_frequency
      - spectral_decomposition_magnitude
      - sweetness
      - spectral_centroid_shift

  sprint_4_meta:
    tool: SeisCoDE_Adapter + MetaAttributeTool
    plane: 2
    uncertainty_range: [0.13, 0.15]
    attributes:
      - som_facies
      - meta_fault_probability
      - seiscodeembedding

# ---------------------------------------------------------------------------
# ANOMALOUS CONTRAST RISK REGISTER
# High-risk attributes that require mandatory GEOX_BLOCK check
# ---------------------------------------------------------------------------

geox_block_triggers:
  mandatory_well_tie_required:
    - instantaneous_frequency
    - sweetness
    - spectral_centroid_shift
    - meta_fault_probability
    - seiscodeembedding

  mandatory_horizon_flattening_required:
    - curvature_most_positive
    - curvature_most_negative
    - meta_fault_probability

  mandatory_human_signoff_required:
    - acoustic_impedance     # 888_HOLD — resource estimation
    - avo_gradient           # 888_HOLD — fluid discrimination for drilling
    - vp_vs_ratio            # 888_HOLD — elastic inversion for reserves
