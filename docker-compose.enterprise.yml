# GEOX Earth Intelligence Core — Enterprise Deployment
# DITEMPA BUKAN DIBERI
# Version: v2026.04.10-EIC

version: '3.8'

services:
  geox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    deploy:
      replicas: 2
      restart_policy:
        condition: any
    environment:
      - GEOX_MODE=enterprise
      - GEOX_VERSION=v2026.04.10-EIC
      - F13_HUMAN_VETO=required
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data:ro
      - vault_999:/app/999_vault
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: geox_redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: geox_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - geox-mcp
    restart: unless-stopped

volumes:
  vault_999:
    driver: local
  redis_data:
    driver: local
