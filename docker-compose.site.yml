# GEOX P0 Site Deployment
# Simple nginx serving static geox-site files

services:
  geox:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: geox_unified
    ports:
      - "8000:8000"
    environment:
      - GEOX_PROFILE=vps
      - GEOX_VERSION=v2026.04.11-DIMENSION-NATIVE
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data:ro
      - vault_999:/app/999_vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - traefik_network
      - arifos_trinity
      - arifos_core_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geox-mcp.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.geox-mcp.entrypoints=websecure"
      - "traefik.http.routers.geox-mcp.tls=true"
      - "traefik.http.routers.geox-mcp.tls.certresolver=letsencrypt"
      - "traefik.http.routers.geox-mcp.service=geox-mcp"
      - "traefik.http.routers.geox-mcp.priority=100"
      - "traefik.http.routers.geox-health.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/health`)"
      - "traefik.http.routers.geox-health.entrypoints=websecure"
      - "traefik.http.routers.geox-health.tls=true"
      - "traefik.http.routers.geox-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.geox-health.service=geox-mcp"
      - "traefik.http.routers.geox-health.priority=100"
      - "traefik.http.routers.geox-profile.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/profile`)"
      - "traefik.http.routers.geox-profile.entrypoints=websecure"
      - "traefik.http.routers.geox-profile.tls=true"
      - "traefik.http.routers.geox-profile.tls.certresolver=letsencrypt"
      - "traefik.http.routers.geox-profile.service=geox-mcp"
      - "traefik.http.routers.geox-profile.priority=100"
      - "traefik.http.services.geox-mcp.loadbalancer.server.port=8000"

  gui:
    image: nginx:alpine
    container_name: geox_gui
    volumes:
      - ./geox-site:/usr/share/nginx/html:ro
      - ./geox-site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    restart: unless-stopped
    depends_on:
      - geox
    networks:
      - traefik_network
      - arifos_trinity
      - arifos_core_network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geox-gui.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox-gui.entrypoints=websecure"
      - "traefik.http.routers.geox-gui.tls=true"
      - "traefik.http.routers.geox-gui.tls.certresolver=letsencrypt"
      - "traefik.http.routers.geox-gui.service=geox-gui"
      - "traefik.http.services.geox-gui.loadbalancer.server.port=80"
      - "traefik.http.routers.geox-gui.priority=1"

volumes:
  vault_999:
    driver: local

networks:
  traefik_network:
    external: true
  arifos_trinity:
    external: true
  arifos_core_network:
    external: true

