# GEOX Earth Intelligence Platform — Dimension-Native Deployment
# DITEMPA BUKAN DIBERI

services:
  # MCP Server (Dimension-Native Architecture v2.0.0)
  geox:
    build:
      context: .
      dockerfile: Dockerfile.unified
    container_name: geox_unified
    ports:
      - "8000:8000"
    environment:
      - GEOX_PROFILE=vps
      - GEOX_VERSION=v2026.04.11-DIMENSION-NATIVE
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data:ro
      - vault_999:/app/999_vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - traefik_network
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      # MCP endpoint
      - "traefik.http.routers.geox-mcp.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/mcp`)"
      - "traefik.http.routers.geox-mcp.entrypoints=websecure"
      - "traefik.http.routers.geox-mcp.tls=true"
      - "traefik.http.routers.geox-mcp.service=geox-mcp"
      - "traefik.http.routers.geox-mcp.priority=100"
      # Health endpoint
      - "traefik.http.routers.geox-health.rule=Host(`geox.arif-fazil.com`) && PathPrefix(`/health`)"
      - "traefik.http.routers.geox-health.entrypoints=websecure"
      - "traefik.http.routers.geox-health.tls=true"
      - "traefik.http.routers.geox-health.service=geox-mcp"
      - "traefik.http.routers.geox-health.priority=100"
      # Service definition
      - "traefik.http.services.geox-mcp.loadbalancer.server.port=8000"

  # GUI (React App with 7-Dimensional Interface)
  gui:
    build:
      context: ./geox-gui
      dockerfile: Dockerfile
    container_name: geox_gui
    expose:
      - "80"
    environment:
      - VITE_GEOX_API_URL=https://geox.arif-fazil.com
    restart: unless-stopped
    depends_on:
      - geox
    networks:
      - traefik_network
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geox-gui.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox-gui.entrypoints=websecure"
      - "traefik.http.routers.geox-gui.tls=true"
      - "traefik.http.routers.geox-gui.service=geox-gui"
      - "traefik.http.services.geox-gui.loadbalancer.server.port=80"
      # GUI catches all except API paths
      - "traefik.http.routers.geox-gui.priority=1"

volumes:
  vault_999:
    driver: local

networks:
  traefik_network:
    external: true
  arifos_trinity:
    external: true
