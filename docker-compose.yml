networks:
  arifos_core_network:
    external: true
services:
  geox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox_eic
    env_file:
    - .env
    environment:
    - GEOX_MODE=research
    - GEOX_VERSION=v2.0.0-UNIFIED
    - F13_HUMAN_VETO=required
    - PYTHONUNBUFFERED=1
    - GEOX_HOST=0.0.0.0
    - GEOX_PORT=8081
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 40s
      test:
      - CMD
      - python3
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8081/health')
      timeout: 10s
    networks:
    - arifos_core_network
    ports:
    - 0.0.0.0:8081:8081
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 65535
        hard: 65535
    volumes:
    - ./data:/data:rw
    - ./fixtures:/app/fixtures:ro
    - vault_999:/app/999_vault
  gui:
    container_name: geox_gui
    depends_on:
    - geox
    expose:
    - '80'
    image: nginx:alpine
    networks:
    - arifos_core_network
    restart: unless-stopped
    volumes:
    - ./geox-site:/usr/share/nginx/html:ro
    - ./geox-site/nginx.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  vault_999:
    driver: local
