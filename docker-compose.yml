# GEOX Earth Intelligence Core — Research Deployment
# DITEMPA BUKAN DIBERI
# Version: v2026.04.10-EIC

version: '3.8'

services:
  # MCP Server (Earth Intelligence Core)
  geox:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: geox_eic
    ports:
      - "8000:8000"
    environment:
      - GEOX_MODE=research
      - GEOX_VERSION=v2026.04.10-EIC
      - F13_HUMAN_VETO=required
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/data:ro
      - vault_999:/app/999_vault
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # GUI (React App with 4 MCP Apps)
  gui:
    build:
      context: ./geox-gui
      dockerfile: Dockerfile
    container_name: geox_gui
    expose:
      - "80"
    environment:
      - VITE_GEOX_API_URL=https://geox.arif-fazil.com
    restart: unless-stopped
    depends_on:
      - geox
    networks:
      - traefik_network
      - arifos_trinity
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.geox.rule=Host(`geox.arif-fazil.com`)"
      - "traefik.http.routers.geox.entrypoints=websecure"
      - "traefik.http.routers.geox.tls=true"
      - "traefik.http.routers.geox.tls.certresolver=letsencrypt"
      - "traefik.http.services.geox.loadbalancer.server.port=80"

volumes:
  vault_999:
    driver: local

networks:
  traefik_network:
    external: true
  arifos_trinity:
    external: true
