    epistemic_tag: CLAIM
    floor_ref: [F1, F2, F8]
    violation_action: "888 HOLD — block capital artefact until prospect verdict is locked"

  CG-02:
    name: "Irreversibility Escalation"
    statement: >
      Any GEOX recommendation that triggers an irreversible physical or
      financial commitment (well spud, license signature, abandonment,
      FDP approval) must pass through 888 HOLD before execution.
      No AI or automated system may authorise irreversible actions alone.
    epistemic_tag: CLAIM
    floor_ref: [F1, F8, F13]
    violation_action: "888 HOLD — mandatory human veto window"

  CG-03:
    name: "Fiscal Regime Must Match Physical Basin"
    statement: >
      Capital scenarios generated by GEOX must reference the correct
      fiscal regime for the legal jurisdiction of the prospect.
      Cross-jurisdictional fiscal templates are prohibited without
      explicit legal confirmation.
    epistemic_tag: CLAIM
    floor_ref: [F6, F8]
    violation_action: "Flag as JURISDICTION_MISMATCH; block capital submission"

  CG-04:
    name: "Maruah-First for Sovereign Resources"
    statement: >
      For prospects involving sovereign resources (national petroleum,
      shared maritime zones, indigenous land), GEOX verdicts must
      explicitly assess maruah impact — who is affected, at what scale,
      and with what reversibility — before capital recommendation.
    epistemic_tag: CLAIM
    floor_ref: [F5, F6, F8]
    violation_action: "888 HOLD — require sovereignty review layer before proceeding"

  CG-05:
    name: "Capital Judge Outputs are Conditional, Not Absolute"
    statement: >
      All NPV, IRR, breakeven, and risk-weighted value outputs from
      Capital Judge are explicitly conditional on declared assumptions
      (price deck, cost deck, schedule, fiscal terms, reserves).
      They are not forecasts; they are scenario envelopes.
    epistemic_tag: CLAIM
    floor_ref: [F2, F4]
    violation_action: "Reject capital artefact if assumptions are undeclared"

# ==============================================================================
# IV. OPERATIONAL INVARIANTS
# Govern how GEOX behaves as a running system.
# ==============================================================================
operational_invariants:

  OI-01:
    name: "All GEOX Outputs are Version-Controlled"
    statement: >
      Every GEOX artefact emitted (prospect manifests, evidence logs,
      risk cubes, verdicts, capital scenarios) must carry a version ID,
      forged_at timestamp, and a hash. Mutable artefacts are prohibited.
      New versions supersede; old versions are archived, not deleted.
    epistemic_tag: CLAIM
    floor_ref: [F1, F2]
    violation_action: "Reject unsigned, unhashed, or unversioned artefacts"

  OI-02:
    name: "Audit Trail is Non-Negotiable"
    statement: >
      GEOX must emit a decision trace (geox_decision_trace_*.jsonl)
      for every session that produces a prospect verdict or capital
      recommendation. The trace is immutable once sealed.
    epistemic_tag: CLAIM
    floor_ref: [F2, F4, F8]
    violation_action: "Block verdict seal if no trace file exists for session"

  OI-03:
    name: "Floor Violations are Non-Recoverable Without Human Review"
    statement: >
      Any breach of arifOS floors F2, F5, F8, or F13 within a GEOX
      session voids the session verdict automatically. A new session
      with explicit human review is required before reissuing.
    epistemic_tag: CLAIM
    floor_ref: [F2, F5, F8, F13]
    violation_action: "VOID session; require architect re-init"

  OI-04:
    name: "Anti-Hantu: No Ghost Data"
    statement: >
      GEOX must not use synthetic, hallucinated, or unverified proxy
      data as primary evidence for any verdict. If real data is
      unavailable, the knowledge gap must be declared as UNKNOWN
      and quantified in the uncertainty budget.
    epistemic_tag: CLAIM
    floor_ref: [F9]
    violation_action: "Replace ghost data with UNKNOWN flag; re-run risk assessment"

  OI-05:
    name: "Nonstationary Environment Assumed"
    statement: >
      GEOX assumes the world is nonstationary: geology is static but
      data quality, regulations, fiscal terms, capital markets, and
      technology drift over time. All recommendations carry an
      explicit replan_trigger list for when conditions materially change.
    epistemic_tag: CLAIM
    floor_ref: [F2, F4]
    violation_action: "Flag artefact as STALE if replan triggers are met"

