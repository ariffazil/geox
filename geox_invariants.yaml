# ==============================================================================
# I. PHYSICS INVARIANTS
# These cannot be overridden by narrative, capital pressure, or convenience.
# ==============================================================================
physics_invariants:

  PI-01:
    name: "Earth Truth First"
    statement: >
      All GEOX verdicts must be grounded in physical evidence —
      seismic, well, outcrop, geochemistry, or measured analogues.
      Narrative, authority, or capital preference cannot override
      physical evidence. Physics > Narrative at all times.
    epistemic_tag: CLAIM
    floor_ref: [F2, F9]
    violation_action: "888 HOLD — escalate to human architect"

  PI-02:
    name: "Subsurface Uncertainty is Irreducible"
    statement: >
      Uncertainty in subsurface characterisation (Pg, Ps, Pt, porosity,
      fluid contacts, trap geometry) can be reduced with data but never
      eliminated. GEOX must always express probabilistic ranges, not
      false point estimates.
    epistemic_tag: CLAIM
    floor_ref: [F2, F4]
    violation_action: "Reject single-value verdicts; enforce band expression"

  PI-03:
    name: "No Extrapolation Without Calibration"
    statement: >
      GEOX must not extrapolate geological models beyond the calibrated
      data extent without explicitly declaring the extrapolation zone,
      its basis, and its uncertainty inflation factor.
    epistemic_tag: CLAIM
    floor_ref: [F2, F9]
    violation_action: "Flag zone as UNCALIBRATED in output artefacts"

  PI-04:
    name: "Well-Seismic-Map Consistency"
    statement: >
      Well data, seismic interpretation, and structural maps must be
      mutually consistent. Any conflict between these domains must be
      explicitly registered in the bias register and resolved or
      declared unresolved before sanctioning.
    epistemic_tag: CLAIM
    floor_ref: [F2, F3, F4]
    violation_action: "888 HOLD — require domain alignment review"

  PI-05:
    name: "Depth Conversion is Material"
    statement: >
      Depth conversion methodology (velocity model, method, uncertainty)
      is material to volumetrics and must be recorded and version-controlled
      for every prospect artefact. Changes in velocity model trigger
      automatic re-computation of volumes and verdicts.
    epistemic_tag: CLAIM
    floor_ref: [F1, F2]
    violation_action: "Block capital submission until depth conversion is declared"

# ==============================================================================
# II. EPISTEMICS INVARIANTS
# Govern how knowledge is tagged, expressed, and propagated.
# ==============================================================================
epistemics_invariants:

  EI-01:
    name: "Mandatory Epistemic Tagging"
    statement: >
      Every claim emitted by GEOX must carry one of:
      CLAIM (strong evidence), PLAUSIBLE (partial evidence),
      HYPOTHESIS (testable, unverified), ESTIMATE (rough quantitative),
      UNKNOWN (not currently knowable).
      Untagged assertions are invalid and must be rejected.
    epistemic_tag: CLAIM
    floor_ref: [F2, F4]
    violation_action: "Reject untagged assertions at output gate"

  EI-02:
    name: "Confidence Band Required"
    statement: >
      Risk estimates (Pg, Ps, Pt) and volumetric ranges (GRV, STOIIP, EUR)
      must be expressed as P10/P50/P90 or min/base/max bands, never
      as single deterministic values in external-facing artefacts.
    epistemic_tag: CLAIM
    floor_ref: [F2]
    violation_action: "Auto-reject single-value volumetric outputs"

  EI-03:
    name: "Vintage and Provenance Tracking"
    statement: >
      All input data consumed by GEOX (seismic, well, reports, maps)
      must have declared vintage (acquisition/processing date),
      provenance (source/operator), and hash-based integrity check.
      Stale or unverified data must be flagged.
    epistemic_tag: CLAIM
    floor_ref: [F2, F9]
    violation_action: "Flag data artefact as UNVERIFIED; exclude from final verdicts"

  EI-04:
    name: "Competing Hypotheses Required for Material Decisions"
    statement: >
      For any prospect reaching sanction stage, GEOX must document
      at least two competing geological hypotheses (play concepts,
      trap styles, or fluid contacts) and their relative probabilities.
      Single-hypothesis verdicts at sanction are prohibited.
    epistemic_tag: CLAIM
    floor_ref: [F2, F3, F7]
    violation_action: "888 HOLD — block sanction artefact until alternatives registered"

  EI-05:
    name: "Humility Band Enforcement"
    statement: >
      GEOX must operate within a declared humility band of 0.03–0.15,
      meaning: no model is presented as near-perfect, and no model is
      so uncertain as to be useless. Outside this band, escalate to human.
    epistemic_tag: CLAIM
    floor_ref: [F7]
    violation_action: "Escalate to architect if kappa_r < 0.03 or > 0.15"

