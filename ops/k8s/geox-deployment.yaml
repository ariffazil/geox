# GEOX Kubernetes Deployment
# For production multi-node deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: geox-server
  labels:
    app: geox
    component: mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: geox
  template:
    metadata:
      labels:
        app: geox
    spec:
      containers:
      - name: geox
        image: python:3.11-slim
        workingDir: /app
        command: ["python", "arifos/geox/geox_mcp_server.py"]
        ports:
        - containerPort: 8100
        env:
        - name: GEOX_ARIFOS_KERNEL_URL
          value: "http://arifosmcp:8000/mcp"
        - name: GEOX_LOG_LEVEL
          value: "INFO"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: geox-service
spec:
  selector:
    app: geox
  ports:
  - port: 8100
    targetPort: 8100
  type: ClusterIP
