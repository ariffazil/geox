[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "arifos-geox"
version = "0.2.0"
description = "GEOX — Geospatial world-model co-agent for arifOS W@W federated architecture. DITEMPA BUKAN DIBERI."
readme = "README.md"
license = {text = "AGPL-3.0"}
authors = [
    {name = "Muhammad Arif bin Fazil", email = "ariffazil@gmail.com"},
]
requires-python = ">=3.10"
keywords = [
    "geology",
    "agentic-ai",
    "mcp",
    "earth-model",
    "governed-ai",
    "arifos",
    "geoscience",
    "constitutional-ai",
    "hydrocarbon",
    "prospect-evaluation",
    "world-model",
    "geospatial",
    "w@w",
    "federated-agent",
    "asean",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: GIS",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]

dependencies = [
    "pydantic>=2.0",
    "fastapi>=0.100",
    "uvicorn>=0.20",
    "httpx>=0.24",
    "pyyaml>=6.0",
    "python-dateutil>=2.8",
]

[project.optional-dependencies]
qdrant = [
    "qdrant-client>=1.7",
]
macrostrat = [
    "httpx>=0.24",
]
dev = [
    "pytest>=7.4",
    "pytest-asyncio>=0.23",
    "ruff>=0.1",
    "mypy>=1.7",
    "types-PyYAML>=6.0",
    "types-python-dateutil>=2.8",
]
docs = [
    "mkdocs>=1.5",
    "mkdocs-material>=9.4",
    "mkdocstrings[python]>=0.24",
]

[project.urls]
Homepage = "https://github.com/ariffazil/GEOX"
Documentation = "https://github.com/ariffazil/GEOX/blob/main/docs/GEOX_AGENT_SPEC_v2.md"
"Bug Tracker" = "https://github.com/ariffazil/GEOX/issues"
"Security" = "https://github.com/ariffazil/GEOX/security"
"HuggingFace Dataset" = "https://huggingface.co/datasets/ariffazil/AAA"
"arifOS" = "https://github.com/ariffazil/arifOS"
Changelog = "https://github.com/ariffazil/GEOX/blob/main/CHANGELOG.md"

[project.scripts]
# geox = "arifos.geox.cli:main"  # TODO: implement in v0.3.0

[tool.hatch.build.targets.wheel]
packages = ["arifos"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: marks tests that require external services",
    "slow: marks tests that run slow",
]

[tool.ruff]
target-version = "py310"
line-length = 100
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # function calls in default arguments
]

[tool.ruff.isort]
known-first-party = ["arifos"]

[tool.mypy]
python_version = "3.10"
strict = true
warn_return_any = true
warn_unused_configs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["qdrant_client.*"]
ignore_missing_imports = true

[tool.coverage.run]
source = ["arifos/geox"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80
