version: '3.8'

services:
  a2a:
    build:
      context: ../..
      dockerfile: services/a2a-gateway/Dockerfile
    image: ghcr.io/geox-platform/geox-a2a:latest
    container_name: geox-a2a
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - ALLOWED_ORIGINS=https://geox.arif-fazil.com,https://apps.geox.arif-fazil.com
    volumes:
      - a2a-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  a2a-data:
