              <div className="grid grid-cols-3 gap-4 h-full overflow-hidden">
                <div className="col-span-2 glass-panel p-4 flex flex-col overflow-y-auto">
                   <div className="flex-1 border-b border-gray-800 pb-4 relative min-h-[150px] flex items-end justify-center gap-1">
                      <div className="absolute top-0 left-0 text-[10px] font-mono text-gray-500">STOIIP DISTRIBUTION (MMstb)</div>
                      <div className="absolute inset-0 flex items-center justify-center opacity-10"><PieChart size={120}/></div>
                      <div className="z-10 bg-amber-500 text-black px-4 py-1 font-mono text-xl font-bold mb-8">P50: {stoiip.toFixed(1)} MMstb</div>
                   </div>
                   <div className="grid grid-cols-4 gap-4 mt-4 text-[10px] font-mono">
                      <div>Sw: <span className="text-amber-500">{(sw*100).toFixed(1)}%</span></div><div>NTG: <span className="text-amber-500">{(ntg*100).toFixed(1)}%</span></div><div>Phi: <span className="text-cyan-400">18%</span></div><div>STOIIP: <span className="text-emerald-400">{stoiip.toFixed(1)}</span></div>
                   </div>
                   {(llmVerdict || llmAnalog) && <div className="mt-4 space-y-2">{llmVerdict && <div className="p-2 bg-emerald-500/5 border border-emerald-500/20 text-emerald-100 text-[10px] font-mono"><Badge color="emerald" className="mb-2">RISK REVIEW</Badge><br/>{llmVerdict}</div>}{llmAnalog && <div className="p-2 bg-purple-500/5 border border-purple-500/20 text-purple-100 text-[10px] font-mono"><Badge color="purple" className="mb-2">ANALOG MATCH</Badge><br/>{llmAnalog}</div>}</div>}
                </div>
                <div className="flex flex-col gap-4">
                   <div className="glass-panel p-4 flex-1">
                      <div className="text-[10px] font-mono text-gray-500 mb-4 border-b border-gray-800 pb-1">CONSTITUTIVE LEVERS</div>
                      {isSealed && <div className="p-2 bg-amber-500/10 border border-amber-500/30 text-amber-500 text-[9px] font-mono mb-4 flex items-center gap-2"><Lock size={12}/> LOCKED BY MCP</div>}
                      <div className="space-y-6">
                        <div><div className="flex justify-between text-[10px] font-mono"><span>Rw</span><span>{rw}</span></div><input type="range" min="0.01" max="0.1" step="0.005" value={rw} onChange={e=>setRw(parseFloat(e.target.value))} disabled={isSealed} className="w-full h-1 accent-amber-500 cursor-pointer"/></div>
                        <div><div className="flex justify-between text-[10px] font-mono"><span>Archie m</span><span>{archieM}</span></div><input type="range" min="1.5" max="2.5" step="0.05" value={archieM} onChange={e=>setArchieM(parseFloat(e.target.value))} disabled={isSealed} className="w-full h-1 accent-amber-500 cursor-pointer"/></div>
                      </div>
                   </div>
                   <div className="space-y-2">
                     <button onClick={async()=>setLlmVerdict(await generate(`Analyze prospect STOIIP ${stoiip.toFixed(1)} MMstb.`))} disabled={isLoading} className="w-full py-2 bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-[10px] font-mono hover:bg-emerald-500/20 transition-all">✨ RISK ASSESSMENT</button>
                     <button onClick={async()=>setLlmAnalog(await generate(`Find analogs for ${stoiip.toFixed(1)} MMstb field.`))} disabled={isLoading} className="w-full py-2 bg-purple-500/10 border border-purple-500/30 text-purple-400 text-[10px] font-mono hover:bg-purple-500/20 transition-all">✨ ANALOG MATCH</button>
                   </div>
                </div>
              </div>
            </div>
          );
        };

        const DomainPetro = () => (
          <div className="p-4 flex flex-col h-full gap-4">
             <div className="flex justify-between items-end border-b border-gray-800 pb-2"><div><h2 className="text-xl font-bold tracking-widest flex items-center gap-2 font-mono"><Target className="w-5 h-5 text-emerald-500" /> 1D PETROPHYSICS</h2><p className="text-[10px] text-gray-500 font-mono">WELL LOGS & CORE SYNTHESIS</p></div><Badge color="emerald">F2: TRUTH</Badge></div>
             <div className="flex-1 glass-panel relative overflow-hidden flex items-center justify-center"><div className="scanline"/><div className="text-[10px] font-mono text-gray-600 uppercase tracking-widest text-center">Triple Combo Manifold Active<br/>[RHOB / NPHI / GR / RES]</div></div>
          </div>
        );

        const DomainStructural = () => (
          <div className="p-4 flex flex-col h-full gap-4">
             <div className="flex justify-between items-end border-b border-gray-800 pb-2"><div><h2 className="text-xl font-bold tracking-widest flex items-center gap-2 font-mono"><Layers className="w-5 h-5 text-blue-500" /> 2D STRUCTURAL</h2><p className="text-[10px] text-gray-500 font-mono">SEISMIC IMAGING & FAULTS</p></div><Badge color="cyan">TRUE SCALE</Badge></div>
             <div className="flex-1 glass-panel relative overflow-hidden flex items-center justify-center font-mono text-[10px] text-gray-600 uppercase tracking-widest text-center">SEG-Y Emulator Hydrated<br/>[FAULT_TRAP DETECTED at 1200ms]</div>
          </div>
        );

        const DomainBasin = () => (
          <div className="p-4 flex flex-col h-full gap-4">
             <div className="flex justify-between items-end border-b border-gray-800 pb-2"><div><h2 className="text-xl font-bold tracking-widest flex items-center gap-2 font-mono"><Box className="w-5 h-5 text-purple-500" /> 3D REGIONAL BASIN</h2><p className="text-[10px] text-gray-500 font-mono">EVOLUTION & STRATIGRAPHY</p></div><Badge color="purple">MACROSTRAT</Badge></div>
             <div className="flex-1 glass-panel relative overflow-hidden"><iframe src="https://macrostrat.org/map/#/z=5/x=103/y=5" className="w-full h-full border-0 opacity-40 grayscale invert" /></div>
          </div>
        );

        const DomainPhysics = ({ isSealed, serverState }) => {
          const { generate, isLoading } = useGeminiAPI();
          const [audit, setAudit] = useState('');
          const canon9 = [ { sym: 'ρ', name: 'Density', val: '2650', color: 'text-amber-500' }, { sym: 'Vp', name: 'P-Wave', val: '4500', color: 'text-blue-400' }, { sym: 'Vs', name: 'S-Wave', val: '2200', color: 'text-blue-400' }, { sym: 'ρₑ', name: 'Resistivity', val: '12.5', color: 'text-red-400' }, { sym: 'k', name: 'Thermal', val: '2.5', color: 'text-orange-500' }, { sym: 'P', name: 'Pressure', val: '45.2', color: 'text-purple-400' }, { sym: 'T', name: 'Temp', val: '385', color: 'text-crimson-400' }, { sym: 'φ', name: 'Porosity', val: '0.18', color: 'text-cyan-400' }, { sym: 'χ', name: 'Mag Susc', val: '0.002', color: 'text-gray-400' } ];
          return (
            <div className="flex flex-col h-full gap-4 p-4">
              <div className="flex justify-between items-end border-b border-gray-800 pb-2"><div><h2 className="text-xl font-bold tracking-widest flex items-center gap-2 font-mono"><Network className="w-5 h-5 text-purple-500" /> PHYSICS ENGINE</h2><p className="text-[10px] text-gray-500 font-mono">EARTH.CANON_9 THERMODYNAMIC SOLVER</p></div><Badge color="purple">F9: ANTI-HANTU</Badge></div>
              <div className="flex-1 grid grid-cols-2 gap-4">
                <div className="glass-panel p-4 grid grid-cols-3 gap-3">
                   {canon9.map((v, i) => (<div key={i} className="border border-gray-800 p-2 flex flex-col justify-between"><div className={`text-xl font-bold ${v.color}`}>{v.sym}</div><div className="text-[9px] text-gray-500 uppercase">{v.name}</div><div className="text-right text-xs font-mono">{v.val}</div></div>))}
                </div>
                <div className="flex flex-col gap-4">
                   <div className="glass-panel p-4 flex-1">
                      <div className="text-[10px] font-mono text-gray-500 mb-4 border-b border-gray-800 pb-1">ANTI-HANTU AUDIT</div>
                      <button onClick={async()=>setAudit(await generate(`Audit Canon-9 state.`))} disabled={isLoading} className="w-full py-2 bg-red-500/10 border border-red-500/30 text-red-100 text-[10px] font-mono">✨ RUN F9 AUDIT</button>
                      {audit && <div className="mt-4 p-2 bg-red-500/5 text-[9px] font-mono text-red-200 border-l-2 border-red-500">{audit}</div>}
                   </div>
                   <button className="py-3 bg-purple-500/10 border border-purple-500/30 text-purple-400 font-mono text-xs uppercase disabled:opacity-50" disabled={isSealed}>EXECUTE BACK-PROPAGATION</button>
                </div>
              </div>
            </div>
          );
        };

        // --- GATEWAY ---
        const McpGatewayModal = ({ isOpen, onClose, onSeal }) => {
          const [step, setStep] = useState(0); const mcp = useMCPClient("ws://localhost:8000/mcp");
          useEffect(() => { if (isOpen) { setStep(0); setTimeout(()=>setStep(1), 500); setTimeout(()=>{ setStep(2); mcp.connect(); }, 1200); } }, [isOpen]);
          useEffect(() => { if (step === 2 && mcp.mcpStatus !== 'connecting' && mcp.mcpStatus !== 'idle') { setStep(3); setTimeout(()=>{ onSeal(mcp.mcpStatus, mcp.canonState); onClose(); }, 1000); } }, [mcp.mcpStatus]);
          if (!isOpen) return null;
          return (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
              <div className="w-[400px] border border-amber-500 p-6 bg-black shadow-[0_0_40px_rgba(245,158,11,0.2)] font-mono text-[10px]">
                <div className="flex gap-4 border-b border-amber-500/30 pb-4 mb-4 items-center"><Server size={24} className="text-amber-500"/><div><h3 className="text-amber-500 font-bold tracking-widest">999_SEAL // COMMAND_AUTH</h3><p className="text-gray-600 uppercase">Tethering WebMCP Umbilical Cord...</p></div></div>
                <div className="space-y-2 text-gray-400">
                  <div className="flex gap-2">{step >= 0 ? <CheckCircle2 size={12} className="text-emerald-500"/> : "---"} <span>[F11] Sovereignty Granted</span></div>
                  <div className="flex gap-2">{step >= 1 ? <CheckCircle2 size={12} className="text-emerald-500"/> : "---"} <span>Locking State Vectors</span></div>
                  <div className="flex gap-2">{step >= 2 ? <CheckCircle2 size={12} className="text-emerald-500"/> : "---"} <span>Handshaking geox_mcp_server.py</span></div>
                  <div className="flex gap-2">{step >= 3 ? (mcp.mcpStatus==='connected'?<Badge color="emerald">CONNECTED</Badge>:<Badge color="crimson">ISOLATED</Badge>) : "---"}</div>
                </div>
              </div>
            </div>
          );
        };

        // --- APP ---
        function GeoxCore() {
          const [active, setActive] = useState('risk'); const [sealed, setSealed] = useState(false); const [status, setStatus] = useState('unsealed'); const [showModal, setShowModal] = useState(false);
          const domains = [ { id: 'risk', label: 'PROSPECT RISK', icon: Activity }, { id: 'petro', label: '1D PETROPHYSICS', icon: Target }, { id: 'structural', label: '2D STRUCTURAL', icon: Layers }, { id: 'basin', label: '3D REGIONAL BASIN', icon: Box }, { id: 'physics', label: 'PHYSICS ENGINE', icon: Network } ];
          return (
            <div className="h-screen w-full flex flex-col font-sans">
              <StyleInject />
              <McpGatewayModal isOpen={showModal} onClose={()=>setShowModal(false)} onSeal={(s)=> { setSealed(true); setStatus(s); }} />
              <header className="h-12 border-b border-gray-800 bg-black flex items-center justify-between px-4 z-10">
                <div className="flex items-center gap-4"><div className="flex items-center gap-2"><Database className="text-amber-500" size={18}/><h1 className="font-mono font-bold tracking-widest text-sm uppercase">GEOX // CORE</h1></div><div className="h-4 w-px bg-gray-800" /><div className="flex items-center gap-3 text-[9px] font-mono">{sealed ? (status==='connected'?<div className="text-amber-500 flex items-center gap-1 animate-pulse"><Server size={10}/> MCP: CONNECTED</div>:<div className="text-crimson-400 flex items-center gap-1"><Radio size={10}/> F12: ISOLATED</div>) : <div className="text-emerald-500 flex items-center gap-1"><div className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"/> ARIF_OS SIMULATION</div>}</div></div>
                <button onClick={()=>!sealed && setShowModal(true)} className={`px-4 py-1 border font-mono text-[10px] tracking-widest uppercase transition-all ${sealed?'border-amber-500 text-amber-500 bg-amber-500/10':'border-gray-700 text-gray-500 hover:text-white'}`}>{sealed?'999_SEALED':'888_JUDGE'}</button>
              </header>
              <div className="flex-1 flex overflow-hidden">
                <aside className="w-64 border-r border-gray-800 bg-black/20 flex flex-col py-4">
                  {domains.map(d => (<button key={d.id} onClick={()=>setActive(d.id)} className={`flex items-center gap-4 px-6 py-4 border-l-2 transition-all ${active===d.id?'border-amber-500 text-amber-500 bg-amber-500/5':'border-transparent text-gray-600 hover:text-gray-300'}`}><d.icon size={18}/><span className="text-[10px] font-mono tracking-widest uppercase text-left">{d.label}</span></button>))}
                  <div className="mt-auto p-4 border-t border-gray-800"><div className="text-[9px] font-mono text-gray-600 mb-2 flex justify-between">SWARM TERMINAL {sealed&&status==='connected'&&<Wifi size={10} className="text-amber-500 animate-pulse"/>}</div><div className="h-32 bg-black border border-gray-800 p-2 text-[9px] font-mono text-emerald-700 overflow-y-auto">{">"} GEOX.INIT_COMPLETE<br/>{">"} 888_JUDGE_READY<br/>{sealed && <span className="text-amber-500">{">"} SWARM_SYNCED_STREAMING</span>}</div></div>
                </aside>
                <main className="flex-1 relative bg-black">
                  {active === 'risk' && <DomainRisk isSealed={sealed} />}
                  {active === 'petro' && <DomainPetro />}
                  {active === 'structural' && <DomainStructural />}
                  {active === 'basin' && <DomainBasin />}
                  {active === 'physics' && <DomainPhysics isSealed={sealed} />}
                </main>
              </div>
              <footer className="h-8 border-t border-gray-800 bg-black flex items-center justify-between px-4 text-[8px] font-mono text-gray-600 tracking-widest"><span>GEOX_CORE_v1.0.0 // UNIT: MALAY_BASIN</span><div className="flex gap-4"><span>ΔS: -0.12</span><span>Ω₀: 0.04</span><span>DITEMPA BUKAN DIBERI</span></div></footer>
            </div>
          );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<GeoxCore />);
    </script>
</body>
</html>
