<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analog Digitization Forge | GEOX Command Center</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0C0E;
            color: #F8FAFC;
        }
        .canvas-bg {
            background-image: 
                radial-gradient(#1E293B 1px, transparent 1px),
                linear-gradient(rgba(30, 41, 59, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(30, 41, 59, 0.2) 1px, transparent 1px);
            background-size: 100px 100px, 20px 20px, 20px 20px;
        }
        .georef-point {
            width: 12px;
            height: 12px;
            background: #F59E0B;
            border: 2px solid #0A0C0E;
            border-radius: 50%;
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: move;
            z-index: 20;
        }
        .georef-point::after {
            content: attr(data-label);
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: #F59E0B;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="h-16 border-b border-[#1E293B] bg-[#111418] flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="w-8 h-8 rounded bg-[#F59E0B] flex items-center justify-center">
                <i data-lucide="scan" class="w-5 h-5 text-[#0A0C0E]"></i>
            </a>
            <div>
                <h1 class="text-sm font-bold uppercase tracking-widest text-[#F8FAFC]">Analog Digitization Forge</h1>
                <p class="text-[10px] text-[#64748B]">Vision Intelligence • Scale Calibration • Georef</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 px-3 py-1 bg-[#1A1F24] border border-[#1E293B] rounded-full">
                <span class="w-2 h-2 rounded-full bg-[#10B981] animate-pulse"></span>
                <span class="text-[10px] text-[#94A3B8] font-mono">VISION_KERNEL_STABLE</span>
            </div>
            <button onclick="window.history.back()" class="text-[#94A3B8] hover:text-[#F8FAFC]">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        <!-- Sidebar: Tools -->
        <aside class="w-72 border-r border-[#1E293B] bg-[#111418] p-4 flex flex-col gap-6 overflow-y-auto">
            <div>
                <label class="text-[10px] text-[#64748B] uppercase tracking-widest mb-3 block">1. Input Analog</label>
                <div class="space-y-3">
                    <button class="w-full flex items-center gap-3 p-3 bg-[#1A1F24] border border-[#1E293B] rounded-lg hover:border-[#F59E0B] transition-all text-xs text-[#94A3B8] hover:text-[#F8FAFC]">
                        <i data-lucide="upload-cloud" class="w-4 h-4 text-[#F59E0B]"></i>
                        Upload Scanned Image
                    </button>
                    <div class="flex gap-2">
                        <button class="flex-1 py-1 px-2 text-[10px] bg-[#0A0C0E] border border-[#1E293B] rounded text-[#64748B] hover:text-[#94A3B8]">Load Demo Map</button>
                        <button class="flex-1 py-1 px-2 text-[10px] bg-[#0A0C0E] border border-[#1E293B] rounded text-[#64748B] hover:text-[#94A3B8]">Load Demo Log</button>
                    </div>
                </div>
            </div>

            <div>
                <label class="text-[10px] text-[#64748B] uppercase tracking-widest mb-3 block">2. Mode Selection</label>
                <div class="grid grid-cols-2 gap-2">
                    <button id="mode-1d" onclick="setMode('1d')" class="p-3 bg-[#F59E0B]/10 border border-[#F59E0B] rounded-lg text-center active">
                        <i data-lucide="align-justify" class="w-5 h-5 mx-auto mb-1 text-[#F59E0B]"></i>
                        <span class="text-[10px] font-bold text-[#F8FAFC]">1D LOG</span>
                    </button>
                    <button id="mode-2d" onclick="setMode('2d')" class="p-3 bg-[#1A1F24] border border-[#1E293B] rounded-lg text-center opacity-50">
                        <i data-lucide="map" class="w-5 h-5 mx-auto mb-1 text-[#94A3B8]"></i>
                        <span class="text-[10px] font-bold text-[#94A3B8]">2D MAP</span>
                    </button>
                </div>
            </div>

            <div id="calibration-controls">
                <label class="text-[10px] text-[#64748B] uppercase tracking-widest mb-3 block">3. Scale Calibration</label>
                <div class="space-y-4">
                    <div class="p-3 bg-[#0A0C0E] border border-[#1E293B] rounded-lg">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] text-[#64748B]">Reference Depth A</span>
                            <span class="text-[10px] text-[#F59E0B]">2100 m</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-[10px] text-[#64748B]">Reference Depth B</span>
                            <span class="text-[10px] text-[#F59E0B]">2500 m</span>
                        </div>
                        <div class="mt-2 pt-2 border-t border-[#1E293B]">
                            <span class="text-[10px] text-[#64748B]">Calculated Pix/m: </span>
                            <span class="text-[10px] text-[#F8FAFC] font-mono">2.45</span>
                        </div>
                    </div>
                    <button class="w-full py-2 bg-[#F59E0B]/10 text-[#F59E0B] border border-[#F59E0B]/30 rounded-lg text-[10px] font-bold hover:bg-[#F59E0B]/20 transition-all">
                        CALIBRATE SCALE
                    </button>
                </div>
            </div>

            <div class="mt-auto">
                <button class="w-full py-3 bg-[#F59E0B] text-[#0A0C0E] rounded-lg text-xs font-bold shadow-lg shadow-amber-500/20 hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                    <i data-lucide="play" class="w-4 h-4"></i>
                    FORGE DIGITAL MANIFEST
                </button>
            </div>
        </aside>

        <!-- Viewport -->
        <div class="flex-1 relative bg-[#0A0C0E] canvas-bg overflow-hidden flex items-center justify-center p-8">
            <div id="image-container" class="relative bg-white shadow-2xl transition-transform cursor-crosshair">
                <img id="analog-image" src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=1000" class="max-w-full max-h-full opacity-80" alt="Analog Map">
                
                <!-- Georef Points -->
                <div class="georef-point" style="top: 20%; left: 30%;" data-label="GCP-01 (2100m)"></div>
                <div class="georef-point" style="top: 80%; left: 30%;" data-label="GCP-02 (2500m)"></div>
                
                <!-- Digitization Trace -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none">
                    <polyline points="280,200 290,250 310,300 285,350 300,400" fill="none" stroke="#F59E0B" stroke-width="2" />
                </svg>
            </div>

            <!-- Floating Overlay UI -->
            <div class="absolute bottom-6 right-6 flex gap-3">
                <div class="px-4 py-2 bg-[#111418]/90 backdrop-blur border border-[#1E293B] rounded-full flex items-center gap-4 text-[10px]">
                    <span class="flex items-center gap-2">
                        <span class="text-[#64748B]">X:</span>
                        <span class="text-[#F8FAFC] font-mono">1.245</span>
                    </span>
                    <span class="flex items-center gap-2">
                        <span class="text-[#64748B]">Y:</span>
                        <span class="text-[#F8FAFC] font-mono">-0.123</span>
                    </span>
                    <span class="text-[#F59E0B]">CALIBRATED</span>
                </div>
                <div class="flex rounded-full bg-[#111418]/90 backdrop-blur border border-[#1E293B] p-1">
                    <button class="p-1.5 hover:text-[#F59E0B]"><i data-lucide="zoom-in" class="w-4 h-4"></i></button>
                    <button class="p-1.5 hover:text-[#F59E0B]"><i data-lucide="zoom-out" class="w-4 h-4"></i></button>
                    <button class="p-1.5 hover:text-[#F59E0B]"><i data-lucide="rotate-ccw" class="w-4 h-4"></i></button>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        function setMode(mode) {
            document.querySelectorAll('button[id^="mode-"]').forEach(btn => {
                btn.classList.remove('bg-[#F59E0B]/10', 'border-[#F59E0B]', 'active');
                btn.classList.add('bg-[#1A1F24]', 'border-[#1E293B]', 'opacity-50');
                btn.querySelector('i').classList.replace('text-[#F59E0B]', 'text-[#94A3B8]');
                btn.querySelector('span').classList.replace('text-[#F8FAFC]', 'text-[#94A3B8]');
            });

            const activeBtn = document.getElementById('mode-' + mode);
            activeBtn.classList.remove('bg-[#1A1F24]', 'border-[#1E293B]', 'opacity-50');
            activeBtn.classList.add('bg-[#F59E0B]/10', 'border-[#F59E0B]', 'active');
            activeBtn.querySelector('i').classList.replace('text-[#94A3B8]', 'text-[#F59E0B]');
            activeBtn.querySelector('span').classList.replace('text-[#94A3B8]', 'text-[#F8FAFC]');
        }
    </script>
</body>
</html>
