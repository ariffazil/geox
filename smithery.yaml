# smithery.yaml — GEOX Smithery MCP Registry Configuration
# DITEMPA BUKAN DIBERI
#
# Smithery is a marketplace for MCP servers
# Registry: https://smithery.ai

name: geox-earth-witness
version: "0.5.0"
display_name: "GEOX — Geological Intelligence Coprocessor"
description: |
  GEOX is a governed, agentic geological intelligence coprocessor for arifOS.
  Provides physically-grounded geological prospect evaluation using Large Earth Models,
  seismic VLM interpretation, basin simulation, and geospatial verification.
  
  Key capabilities:
  - Prospect evaluation with constitutional floor enforcement
  - Structural validation (fault mechanics, shortening calculations)
  - Geological memory RAG over past evaluations
  - Tri-app architecture: Map + Cross Section + Seismic Section
  
  Verdict outcomes: SEAL (high confidence), PARTIAL (supported with caveats),
  SABAR (wait/gather more), VOID (contradictions detected)

category: science
subcategory: geology

# MCP protocol
mcp_version: "2025-11-25"
transport: http
command: python
args: ["server.py"]

# Installation
install:
  method: pip
  package: arifos-geox
  source: https://github.com/ariffazil/geox
  python_version: ">=3.11"

# Sovereign 15 Tools — 14 canonical + 1 DST ingestion specialist
tools:
  - id: geox_data_ingest_bundle
    name: geox_data_ingest_bundle
    description: Lazy ingest LAS/CSV/SEG-Y/JSON/GeoJSON/Parquet/analog log into the artifact store. Returns artifact_ref for downstream tools.
    input_schema:
      type: object
      properties:
        file_path: { type: string, description: "Path or URL to the data file" }
        format: { type: string, enum: [las, csv, segy, json, geojson, parquet, analog] }
        artifact_label: { type: string }
      required: [file_path, format]

  - id: geox_data_qc_bundle
    name: geox_data_qc_bundle
    description: Unified QC gate — header, unit, missingness, spike, and range verification. Promotes artifact_ref to QC_VERIFIED on pass; blocks on fail.
    input_schema:
      type: object
      properties:
        artifact_ref: { type: string }
      required: [artifact_ref]

  - id: geox_subsurface_generate_candidates
    name: geox_subsurface_generate_candidates
    description: Petrophysics + structural geometry ensemble (MIN/MID/MAX realizations) with residuals, evidence_density, and assumptions. Requires QC_VERIFIED input.
    input_schema:
      type: object
      properties:
        target_class: { type: string, enum: [petrophysics, structure, flattening, vsh, porosity, saturation, netpay, permeability, gr_motif, lithology] }
        evidence_refs: { type: array, items: { type: string } }
        realizations: { type: integer, default: 3 }
      required: [target_class, evidence_refs]

  - id: geox_subsurface_verify_integrity
    name: geox_subsurface_verify_integrity
    description: Physics-9 integrity gate — enforces nine physical law constraints on candidate outputs. SEAL/FAIL/HOLD verdict. Requires geox:governance scope.
    input_schema:
      type: object
      properties:
        candidate_ref: { type: string }
        domain: { type: string, enum: [petrophysics, structure, seismic, geochemistry] }
      required: [candidate_ref, domain]

  - id: geox_seismic_analyze_volume
    name: geox_seismic_analyze_volume
    description: Seismic attribute computation (RMS, variance, sweetness, coherence), slice rendering, vision review, and viewer payload preparation.
    input_schema:
      type: object
      properties:
        volume_ref: { type: string }
        mode: { type: string, enum: [load_line, load_volume, compute_attribute, render_slice, vision_review, viewer_payload], default: compute_attribute }
        attribute: { type: string, default: rms }
      required: [volume_ref]

  - id: geox_section_interpret_correlation
    name: geox_section_interpret_correlation
    description: Multi-well stratigraphic correlation and marker interpretation. Returns formation tops, GR motifs, sequence boundaries.
    input_schema:
      type: object
      properties:
        section_ref: { type: string }
        well_refs: { type: array, items: { type: string } }
        mode: { type: string, enum: [correlation, gr_motif, sequence_stratigraphy], default: correlation }
      required: [section_ref, well_refs]

  - id: geox_map_context_scene
    name: geox_map_context_scene
    description: Geospatial context, CRS validation, georeferencing, basin atlas lookup, and F6 Maruah territory flag for community/indigenous overlap.
    input_schema:
      type: object
      properties:
        bbox: { type: array, items: { type: number }, description: "[min_lon, min_lat, max_lon, max_lat]" }
        crs: { type: string, default: "EPSG:4326" }
      required: [bbox]

  - id: geox_time4d_analyze_system
    name: geox_time4d_analyze_system
    description: Burial history, thermal maturity (Ro%), trap-charge timing, and regime shift analysis. Returns petroleum system timeline.
    input_schema:
      type: object
      properties:
        basin_ref: { type: string }
        mode: { type: string, enum: [burial_history, maturity, trap_timing, regime_shift], default: burial_history }
      required: [basin_ref]

  - id: geox_prospect_evaluate
    name: geox_prospect_evaluate
    description: Integrated P10/P50/P90 volumetrics, Probability of Success (POS), Expected Value of Information (EVOI), and risk matrix. Returns requires_governance true.
    input_schema:
      type: object
      properties:
        prospect_ref: { type: string }
        mode: { type: string, enum: [volumetrics, pos, evoi, risk_matrix], default: volumetrics }
      required: [prospect_ref]

  - id: geox_prospect_judge_preview
    name: geox_prospect_judge_preview
    description: Reversible advisory verdict — returns JUDGE_PREVIEW/HOLD without consuming sovereign ack. Safe for automation.
    input_schema:
      type: object
      properties:
        prospect_ref: { type: string }
        ac_risk_score: { type: number, minimum: 0, maximum: 1 }
      required: [prospect_ref, ac_risk_score]

  - id: geox_prospect_judge_seal
    name: geox_prospect_judge_seal
    description: Irreversible governance verdict gate — emits SEAL/PARTIAL/SABAR/VOID/888_HOLD. Routes to arif_judge_deliberate. Requires ack_irreversible=true and geox:governance scope.
    input_schema:
      type: object
      properties:
        prospect_ref: { type: string }
        ac_risk_score: { type: number, minimum: 0, maximum: 1 }
        ack_irreversible: { type: boolean, description: "Must be true to proceed past RT-3 guard" }
      required: [prospect_ref, ac_risk_score, ack_irreversible]

  - id: geox_dst_ingest_test
    name: geox_dst_ingest_test
    description: Structured Drill-Stem Test ingestion — computes CGR, WGR, hydrocarbon gas, drawdown proxy, and CO2/H2S classification.
    input_schema:
      type: object
      properties:
        well_id: { type: string }
        gas_rate_mmscfd: { type: number }
        condensate_rate_stbd: { type: number }
        water_rate_stbd: { type: number }
        bhp_psi: { type: number }
        whp_psi: { type: number }
      required: [well_id]

  - id: geox_evidence_summarize_cross
    name: geox_evidence_summarize_cross
    description: Cross-domain synthesis — evidence graph, contradiction detection, residual analysis, and federation handoff. Rejects HYPOTHESIS/DERIVED_CANDIDATE inputs.
    input_schema:
      type: object
      properties:
        evidence_refs: { type: array, items: { type: string } }
        export_format: { type: string, enum: [json, markdown, graph], default: json }
      required: [evidence_refs]

  - id: geox_system_registry_status
    name: geox_system_registry_status
    description: Contract introspection — tool count, alias table, manifest parity, health, and federation status. Returns canonical_tool_count=14, total_tools=15.
    input_schema:
      type: object
      properties:
        include_aliases: { type: boolean, default: false }
      required: []

  - id: geox_history_audit
    name: geox_history_audit
    description: VAULT999 lineage retrieval — prior runs, provenance chain, artifact versions, and decision delta for a prospect or artifact_ref.
    input_schema:
      type: object
      properties:
        artifact_ref: { type: string }
        depth: { type: integer, default: 10, description: "Max history entries to return" }
      required: [artifact_ref]

# Constitutional governance
governance:
  floors:
    - id: F1; name: Amanah; description: Reversibility
    - id: F2; name: Truth; description: All claims Earth-verified
    - id: F4; name: Clarity; description: Units + coordinates required
    - id: F7; name: Humility; description: Uncertainty calibrated
    - id: F9; name: Anti-Hantu; description: No hallucinated geology
    - id: F11; name: Authority; description: Provenance mandatory
    - id: F13; name: Sovereign; description: Human veto hook active

# Verdict system
verdicts:
  SEAL: { confidence_min: 0.80, action: auto_proceed }
  PARTIAL: { confidence_min: 0.50, action: proceed_with_caveats }
  SABAR: { confidence_min: 0.25, action: hold_wait_data }
  VOID: { confidence_min: 0.00, action: block_stop }

